services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    depends_on:
      - qdrant
      - image-gen
    ports:
      - "${LOCALAI_BIND_IP:-127.0.0.1}:${LOCALAI_OPENWEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - VECTOR_DB=qdrant
      - QDRANT_URI=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=${LOCALAI_RAG_EMBED_MODEL:-nomic-embed-text}
      - RAG_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - RAG_TOP_K=${LOCALAI_RAG_TOP_K:-2}
      - CHUNK_SIZE=${LOCALAI_RAG_CHUNK_SIZE:-800}
      - CHUNK_OVERLAP=${LOCALAI_RAG_CHUNK_OVERLAP:-100}
      - ENABLE_RAG_HYBRID_SEARCH=${LOCALAI_RAG_HYBRID_SEARCH:-false}
      - RAG_EMBEDDING_BATCH_SIZE=${LOCALAI_RAG_EMBED_BATCH_SIZE:-1}
      - RAG_EMBEDDING_CONCURRENT_REQUESTS=${LOCALAI_RAG_EMBED_CONCURRENT_REQUESTS:-1}
      - ENABLE_WEB_SEARCH=${LOCALAI_WEB_ENABLED:-false}
      - WEB_SEARCH_ENGINE=${LOCALAI_WEB_SEARCH_ENGINE:-searxng}
      - SEARXNG_QUERY_URL=${LOCALAI_SEARXNG_QUERY_URL:-http://searxng:8080/search?q=<query>&format=json}
      - WEB_SEARCH_RESULT_COUNT=${LOCALAI_WEB_SEARCH_RESULT_COUNT:-3}
      - WEB_SEARCH_CONCURRENT_REQUESTS=${LOCALAI_WEB_SEARCH_CONCURRENT_REQUESTS:-4}
      - WEB_LOADER_CONCURRENT_REQUESTS=${LOCALAI_WEB_LOADER_CONCURRENT_REQUESTS:-2}
      - WEB_SEARCH_TIMEOUT=${LOCALAI_WEB_SEARCH_TIMEOUT_SECONDS:-8}
      - LOCALAI_IMAGE_GEN_ENABLED=${LOCALAI_IMAGE_GEN_ENABLED:-0}
      - LOCALAI_IMAGE_GEN_BACKEND_URL=${LOCALAI_IMAGE_GEN_BACKEND_URL:-http://image-gen:8090}
      - ENABLE_IMAGE_GENERATION=${LOCALAI_OPENWEBUI_ENABLE_IMAGE_GENERATION:-False}
      - IMAGE_GENERATION_ENGINE=${LOCALAI_OPENWEBUI_IMAGE_GENERATION_ENGINE:-openai}
      - IMAGE_GENERATION_MODEL=${LOCALAI_OPENWEBUI_IMAGE_GENERATION_MODEL:-localai-imagegen}
      - IMAGES_OPENAI_API_BASE_URL=${LOCALAI_OPENWEBUI_IMAGES_OPENAI_API_BASE_URL:-http://image-gen:8090/v1}
      - IMAGES_OPENAI_API_KEY=${LOCALAI_OPENWEBUI_IMAGES_OPENAI_API_KEY:-localai}
      - IMAGE_SIZE=${LOCALAI_OPENWEBUI_IMAGE_SIZE:-1024x1024}
      - IMAGE_STEPS=${LOCALAI_OPENWEBUI_IMAGE_STEPS:-20}
    volumes:
      - openwebui-data:/app/backend/data
    restart: unless-stopped
  model-admin:
    build:
      context: ./model_admin
    container_name: localai-model-admin
    ports:
      - "${LOCALAI_BIND_IP:-127.0.0.1}:${LOCALAI_MODEL_ADMIN_PORT:-3010}:8081"
    env_file:
      - path: .localai.env
        required: false
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - MODEL_ADMIN_USERNAME=${MODEL_ADMIN_USERNAME:-}
      - MODEL_ADMIN_PASSWORD=${MODEL_ADMIN_PASSWORD:-}
    restart: unless-stopped
  qdrant:
    image: qdrant/qdrant:latest
    container_name: localai-qdrant
    ports:
      - "${LOCALAI_BIND_IP:-127.0.0.1}:${LOCALAI_QDRANT_PORT:-6333}:6333"
    command:
      - /bin/sh
      - -lc
      - |
        if [ -n "${QDRANT_API_KEY:-}" ]; then
          export QDRANT__SERVICE__API_KEY="${QDRANT_API_KEY}"
        else
          unset QDRANT__SERVICE__API_KEY
        fi
        exec ./entrypoint.sh
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT__STORAGE__OPTIMIZERS__DEFAULT_SEGMENT_NUMBER=${LOCALAI_QDRANT_DEFAULT_SEGMENT_NUMBER:-2}
      - QDRANT__STORAGE__OPTIMIZERS__MEMMAP_THRESHOLD_KB=${LOCALAI_QDRANT_MEMMAP_THRESHOLD_KB:-100000}
      - QDRANT__STORAGE__OPTIMIZERS__INDEXING_THRESHOLD_KB=${LOCALAI_QDRANT_INDEXING_THRESHOLD_KB:-50000}
      - QDRANT__STORAGE__HNSW_INDEX__M=${LOCALAI_QDRANT_HNSW_M:-24}
      - QDRANT__STORAGE__HNSW_INDEX__EF_CONSTRUCT=${LOCALAI_QDRANT_HNSW_EF_CONSTRUCT:-100}
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped
  searxng:
    image: searxng/searxng:latest
    container_name: localai-searxng
    ports:
      - "${LOCALAI_BIND_IP:-127.0.0.1}:${LOCALAI_SEARXNG_PORT:-8082}:8080"
    environment:
      - INSTANCE_NAME=localai-searxng
      - SEARXNG_BASE_URL=http://searxng:8080/
      - SEARXNG_SECRET=${LOCALAI_SEARXNG_SECRET:-}
      - UWSGI_WORKERS=${LOCALAI_SEARXNG_WORKERS:-2}
      - UWSGI_THREADS=${LOCALAI_SEARXNG_THREADS:-2}
      - SEARXNG_REDIS_URL=${LOCALAI_SEARXNG_REDIS_URL:-}
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: localai-redis
    command:
      - /bin/sh
      - -lc
      - >
        exec redis-server --save "" --appendonly no
        --maxmemory "${LOCALAI_WEB_REDIS_MAXMEMORY_MB:-256}mb"
        --maxmemory-policy "${LOCALAI_WEB_REDIS_MAXMEMORY_POLICY:-allkeys-lru}"
    restart: unless-stopped
  image-redis:
    image: redis:7-alpine
    container_name: localai-image-redis
    command:
      - /bin/sh
      - -lc
      - >
        exec redis-server --save "" --appendonly no
        --maxmemory "${LOCALAI_IMAGE_GEN_REDIS_MAXMEMORY_MB:-256}mb"
        --maxmemory-policy "allkeys-lru"
    restart: unless-stopped
  minio:
    image: minio/minio:latest
    container_name: localai-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${LOCALAI_MINIO_ROOT_USER:-localai}
      - MINIO_ROOT_PASSWORD=${LOCALAI_MINIO_ROOT_PASSWORD:-localai-localai-localai}
    ports:
      - "${LOCALAI_BIND_IP:-127.0.0.1}:${LOCALAI_MINIO_PORT:-9000}:9000"
      - "${LOCALAI_BIND_IP:-127.0.0.1}:${LOCALAI_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
  image-gen:
    build:
      context: ./image_gen
    container_name: localai-image-gen
    depends_on:
      - image-redis
      - minio
    ports:
      - "${LOCALAI_BIND_IP:-127.0.0.1}:${LOCALAI_IMAGE_GEN_PORT:-8090}:8090"
    environment:
      - LOCALAI_IMAGE_GEN_PROVIDER=${LOCALAI_IMAGE_GEN_PROVIDER:-mock}
      - LOCALAI_IMAGE_GEN_ARTIFACT_STORE=${LOCALAI_IMAGE_GEN_ARTIFACT_STORE:-minio}
      - LOCALAI_IMAGE_GEN_CONCURRENCY=${LOCALAI_IMAGE_GEN_CONCURRENCY:-1}
      - LOCALAI_IMAGE_GEN_PUBLIC_BASE_URL=${LOCALAI_IMAGE_GEN_PUBLIC_BASE_URL:-http://127.0.0.1:8090}
      - LOCALAI_IMAGE_GEN_DATA_DIR=/data
      - LOCALAI_IMAGE_GEN_REDIS_URL=${LOCALAI_IMAGE_GEN_REDIS_URL:-redis://image-redis:6379/0}
      - LOCALAI_IMAGE_GEN_A1111_URL=${LOCALAI_IMAGE_GEN_A1111_URL:-}
      - LOCALAI_MINIO_ENDPOINT=${LOCALAI_MINIO_ENDPOINT:-http://minio:9000}
      - LOCALAI_MINIO_BUCKET=${LOCALAI_MINIO_BUCKET:-generated}
      - LOCALAI_MINIO_ROOT_USER=${LOCALAI_MINIO_ROOT_USER:-localai}
      - LOCALAI_MINIO_ROOT_PASSWORD=${LOCALAI_MINIO_ROOT_PASSWORD:-localai-localai-localai}
    volumes:
      - image-gen-data:/data
    restart: unless-stopped

volumes:
  openwebui-data:
  qdrant-data:
  minio-data:
  image-gen-data:
