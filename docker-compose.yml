services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    ports:
      - "${LOCALAI_BIND_IP:-127.0.0.1}:${LOCALAI_OPENWEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - openwebui-data:/app/backend/data
    restart: unless-stopped
  model-admin:
    build:
      context: ./model_admin
    container_name: localai-model-admin
    ports:
      - "${LOCALAI_BIND_IP:-127.0.0.1}:${LOCALAI_MODEL_ADMIN_PORT:-3010}:8081"
    env_file:
      - path: .localai.env
        required: false
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MODEL_ADMIN_USERNAME=${MODEL_ADMIN_USERNAME:-}
      - MODEL_ADMIN_PASSWORD=${MODEL_ADMIN_PASSWORD:-}
    restart: unless-stopped
  qdrant:
    image: qdrant/qdrant:latest
    container_name: localai-qdrant
    ports:
      - "${LOCALAI_BIND_IP:-127.0.0.1}:${LOCALAI_QDRANT_PORT:-6333}:6333"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-}
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

volumes:
  openwebui-data:
  qdrant-data:
