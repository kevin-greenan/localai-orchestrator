[project]
name = "localai-mac"

[native.ollama]
enabled = true
label = "com.localai.ollama"
host = "127.0.0.1"
port = 11434
models = ["llama3.2:3b", "nomic-embed-text"]
warmup_model = "llama3.2:3b"
warmup_prompt = "Reply with exactly: warm"

# Optional manual overrides (if set, they win when tuning.respect_user_values = true):
# keep_alive = "45m"
# num_parallel = 6
# max_loaded_models = 3

# Extra knobs can be injected here if needed.
# Example:
# [native.ollama.env]
# OLLAMA_MAX_QUEUE = "64"

[tuning]
enabled = true
respect_user_values = true

[docker]
compose_file = "docker-compose.yml"
services = ["openwebui", "model-admin", "qdrant"]

[rag]
preset = "fast"

[rag.qdrant]
enabled = true

# Optional manual overrides (if set, they win when tuning.respect_user_values = true):
# default_segment_number = 2
# memmap_threshold_kb = 100000
# indexing_threshold_kb = 50000
# hnsw_m = 24
# hnsw_ef_construct = 100

[web]
enabled = false
engine = "searxng"
searxng_query_url = "http://searxng:8080/search?q=<query>&format=json"

# Optional manual overrides (if set, they win when tuning.respect_user_values = true):
# result_count = 5
# search_concurrent_requests = 6
# loader_concurrent_requests = 3
# request_timeout_seconds = 8

[web.redis]
# Optional manual overrides (if set, they win when tuning.respect_user_values = true):
# maxmemory_mb = 512
# maxmemory_policy = "allkeys-lru"

[vision]
enabled = false
default_model = "llava:latest"
max_image_mb = 10
benchmark_dataset = "tests/fixtures/vision/smoke.jsonl"

[image_gen]
enabled = false
provider = "mock"
concurrency = 1
queue_timeout_seconds = 300
artifact_store = "minio"
backend_url = "http://image-gen:8090"
a1111_url = ""
openwebui_model = "localai-imagegen"
openwebui_image_size = "1024x1024"

[health]
openwebui_url = "http://127.0.0.1:3000/health"
qdrant_url = "http://127.0.0.1:6333/healthz"
